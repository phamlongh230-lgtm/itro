<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vũ Văn Tâm</title>
<meta name="description" content="Vũ Văn Tâm — Builder · Developer · 17">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Be+Vietnam+Pro:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Gowun Batang', 'Nanum Myeongjo', serif;
    color: #fdf0d5;
    position: relative;
    background: linear-gradient(180deg,
      #0d0200 0%,
      #3a0800 25%,
      #7a1a00 55%,
      #c45000 80%,
      #e8780a 92%,
      #f5a030 100%);
    background-attachment: fixed;
  }

  /* Sun glow at horizon */
  .sun-glow {
    position: fixed;
    bottom: 22vh;
    left: 50%;
    transform: translateX(-50%);
    width: 320px; height: 160px;
    background: radial-gradient(ellipse at center bottom,
      rgba(255,200,60,0.55) 0%,
      rgba(255,120,10,0.28) 45%,
      transparent 75%);
    filter: blur(28px);
    pointer-events: none;
    z-index: 1;
  }

  /* Warm atmosphere overlay */
  .atmosphere {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      radial-gradient(ellipse at 50% 78%, rgba(255,140,20,0.32), transparent 55%),
      radial-gradient(ellipse at 15% 90%, rgba(120,10,0,0.38), transparent 45%),
      radial-gradient(ellipse at 85% 90%, rgba(100,8,0,0.32), transparent 45%),
      radial-gradient(ellipse at 50% 5%,  rgba(5,0,0,0.6), transparent 40%);
  }

  /* Horizon glow line */
  .horizon {
    position: fixed;
    bottom: 22vh;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent,
      rgba(255,160,40,0.45) 15%,
      rgba(255,210,80,0.85) 50%,
      rgba(255,160,40,0.45) 85%,
      transparent);
    pointer-events: none;
    z-index: 2;
  }

  /* Particles layer */
  .particles {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }

  /* Ember — rises up */
  .ember {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: ember-rise linear infinite;
    opacity: 0;
  }
  @keyframes ember-rise {
    0%   { transform: translateY(0)     translateX(0px)          scale(0.5); opacity: 0; }
    10%  { opacity: 0.9; }
    80%  { opacity: 0.6; }
    100% { transform: translateY(-75vh) translateX(var(--drift)) scale(1.3); opacity: 0; }
  }

  /* Petal — drifts down */
  .petal {
    position: absolute;
    top: -8vh;
    pointer-events: none;
    animation: petal-fall linear infinite;
    opacity: 0;
  }
  .petal-inner {
    animation: petal-sway ease-in-out infinite alternate;
  }
  @keyframes petal-fall {
    0%   { transform: translateY(0);      opacity: 0; }
    8%   { opacity: 0.85; }
    88%  { opacity: 0.6; }
    100% { transform: translateY(112vh);  opacity: 0; }
  }
  @keyframes petal-sway {
    from { transform: translateX(-22px) rotate(-18deg); }
    to   { transform: translateX( 22px) rotate( 18deg); }
  }

  /* Vertical accent line */
  .vline {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 1px; height: 0;
    background: linear-gradient(180deg,
      transparent,
      rgba(255,160,50,0.5) 22%,
      rgba(255,160,50,0.5) 78%,
      transparent);
    z-index: 5;
    animation: lineGrow 2.4s cubic-bezier(0.16,1,0.3,1) 1.6s forwards;
  }
  @keyframes lineGrow { to { height: 72vh; } }

  /* Main content */
  .content {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(0.75rem, 1.15vw, 0.95rem);
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: rgba(255,210,130,0.7);
    margin-bottom: 2.2rem;
    padding-left: 0.38em;
    opacity: 0;
    animation: fadeIn 1.6s ease-out 0.4s forwards;
  }

  .title {
    font-family: 'Nanum Myeongjo', serif;
    font-weight: 800;
    font-size: clamp(2.8rem, 7.2vw, 5.8rem);
    line-height: 1.28;
    letter-spacing: -0.012em;
    color: #fdf0d5;
    text-shadow:
      0 2px 40px rgba(255,110,10,0.65),
      0 0  80px rgba(255,60,0,0.25);
  }

  .title .line1 {
    display: block;
    opacity: 0;
    animation: fadeUp 1.6s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
  }
  .title .line2 {
    display: block;
    color: #ffb347;
    opacity: 0;
    animation: fadeUp 1.6s cubic-bezier(0.16,1,0.3,1) 1.05s forwards;
  }
  .title .line2 em {
    font-style: italic;
    color: #ffd27a;
  }

  /* Vietnamese sub-labels under each Korean line */
  .vi-sub {
    display: block;
    font-family: 'Be Vietnam Pro', 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(0.68rem, 1.05vw, 0.85rem);
    letter-spacing: 0.14em;
    color: rgba(255,185,90,0.58);
    margin-top: 0.28rem;
  }

  /* Ornament / tagline */
  .ornament {
    margin-top: 2.8rem;
    font-family: 'Gowun Batang', serif;
    font-size: clamp(0.78rem, 1.15vw, 0.92rem);
    color: rgba(255,200,120,0.72);
    letter-spacing: 0.13em;
    opacity: 0;
    animation: fadeIn 1.8s ease-out 1.8s forwards;
  }
  .ornament .vi {
    display: block;
    font-family: 'Be Vietnam Pro', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 0.84em;
    color: rgba(255,175,90,0.5);
    margin-top: 0.45rem;
    letter-spacing: 0.07em;
  }
  .ornament .dash {
    display: inline-block;
    width: 1.6em; height: 1px;
    background: rgba(255,150,40,0.5);
    vertical-align: middle;
    margin: 0 0.8em;
  }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Audio button */
  .audio-btn {
    position: fixed;
    bottom: 2rem; right: 2rem;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: rgba(90,20,0,0.45);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,140,40,0.38);
    color: #ffd080;
    font-size: 1.35rem;
    cursor: pointer;
    z-index: 20;
    transition: transform 0.35s ease, background 0.35s ease, box-shadow 0.35s ease;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 22px rgba(200,50,0,0.28);
    font-family: serif;
    opacity: 0;
    animation: fadeIn 1s ease-out 2.4s forwards;
  }
  .audio-btn:hover {
    background: rgba(140,40,0,0.58);
    transform: scale(1.08);
    box-shadow: 0 8px 28px rgba(220,80,0,0.42);
  }
  .audio-btn.playing .icon {
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1);    opacity: 1;   }
    50%       { transform: scale(1.18); opacity: 0.65; }
  }

  .audio-hint {
    position: fixed;
    bottom: 5.8rem; right: 2rem;
    font-family: 'Gowun Batang', serif;
    font-size: 0.78rem;
    color: #fdf0d5;
    background: rgba(70,15,0,0.72);
    padding: 0.45rem 0.85rem;
    border-radius: 20px;
    z-index: 20;
    pointer-events: none;
    box-shadow: 0 2px 10px rgba(180,50,0,0.2);
    opacity: 0;
    animation: hintIn 0.6s ease-out 2.6s forwards, hintOut 0.6s ease-out 9s forwards;
  }
  @keyframes hintIn  { to { opacity: 1; } }
  @keyframes hintOut { to { opacity: 0; transform: translateY(10px); } }

  /* Top-left signature */
  .signature {
    position: fixed;
    top: 2rem; left: 2rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    color: rgba(255,185,90,0.55);
    z-index: 15;
    opacity: 0;
    animation: fadeIn 1.4s ease-out 2.2s forwards;
  }
  .signature::before {
    content: '';
    display: inline-block;
    width: 24px; height: 1px;
    background: rgba(255,150,40,0.48);
    vertical-align: middle;
    margin-right: 0.6em;
  }

  @media (max-width: 640px) {
    .audio-btn  { width: 50px; height: 50px; bottom: 1.5rem; right: 1.5rem; font-size: 1.2rem; }
    .audio-hint { bottom: 4.8rem; right: 1.5rem; font-size: 0.72rem; }
    .signature  { top: 1.2rem; left: 1.2rem; font-size: 0.8rem; }
    .ornament   { margin-top: 1.8rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    .ember, .petal, .petal-inner { animation: none !important; }
  }
</style>
</head>
<body>

<div class="sun-glow"></div>
<div class="atmosphere"></div>
<div class="horizon"></div>
<div class="particles" id="particles"></div>
<div class="vline"></div>

<div class="signature">Tâm &nbsp;·&nbsp; Summer, 2026</div>

<main class="content">
  <p class="subtitle">Builder &nbsp;·&nbsp; Developer &nbsp;·&nbsp; 17</p>

  <h1 class="title">
    <span class="line1">Vũ Văn</span>
    <span class="line2"><em>Tâm</em></span>
  </h1>

  <div class="ornament">
    <span class="dash"></span>Tôi xây dựng những thứ tôi muốn thấy tồn tại<span class="dash"></span>
  </div>
</main>

<audio id="bgm" loop preload="auto">
  <source src="bg.mp3" type="audio/mpeg">
</audio>

<div class="audio-hint" id="audioHint">♪ Nhấn để phát nhạc nền</div>
<button id="audioToggle" class="audio-btn" aria-label="배경음 토글">
  <span class="icon">♪</span>
</button>

<script>
  const warmColors = [
    '#ffb347','#ff8c00','#ffd700','#ff6b35',
    '#ffcc66','#ff4500','#ffa500','#ffe066'
  ];

  const petalSVGs = [
    `<svg viewBox="0 0 40 60" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 3 Q 34 20, 20 57 Q 6 20, 20 3 Z" fill="var(--pc)" opacity="0.82"/>
    </svg>`,
    `<svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="18" cy="18" rx="9" ry="15" fill="var(--pc)" opacity="0.78"/>
    </svg>`
  ];

  const container = document.getElementById('particles');
  const isMobile  = window.innerWidth < 640;

  // Embers rising
  const emberCount = isMobile ? 22 : 45;
  for (let i = 0; i < emberCount; i++) {
    const el    = document.createElement('div');
    el.className = 'ember';
    const size  = 1.5 + Math.random() * 4.5;
    const left  = 5 + Math.random() * 90;
    const bot   = Math.random() * 55;
    const dur   = 5 + Math.random() * 9;
    const delay = Math.random() * 14;
    const drift = (Math.random() - 0.5) * 90;
    const col   = warmColors[Math.floor(Math.random() * warmColors.length)];

    el.style.cssText = `
      left:${left}vw; bottom:${bot}vh;
      width:${size}px; height:${size}px;
      background:${col};
      box-shadow:0 0 ${size*2.5}px ${col};
      animation-duration:${dur}s;
      animation-delay:-${delay}s;
      --drift:${drift}px;
    `;
    container.appendChild(el);
  }

  // Petals drifting down
  const petalCount = isMobile ? 10 : 22;
  for (let i = 0; i < petalCount; i++) {
    const outer = document.createElement('div');
    outer.className = 'petal';
    const inner = document.createElement('div');
    inner.className = 'petal-inner';

    const size   = 10 + Math.random() * 18;
    const left   = Math.random() * 100;
    const dur    = 9 + Math.random() * 11;
    const sway   = 2.2 + Math.random() * 2.8;
    const delay  = Math.random() * 20;
    const sdel   = Math.random() * sway;
    const col    = warmColors[Math.floor(Math.random() * warmColors.length)];
    const svg    = petalSVGs[Math.floor(Math.random() * petalSVGs.length)];

    outer.style.cssText = `left:${left}vw; width:${size}px; height:${size}px;
      animation-duration:${dur}s; animation-delay:-${delay}s;
      opacity:${0.55 + Math.random()*0.4};`;
    inner.style.cssText = `animation-duration:${sway}s; animation-delay:-${sdel}s;`;
    inner.style.setProperty('--pc', col);
    inner.innerHTML = svg;

    outer.appendChild(inner);
    container.appendChild(outer);
  }

  // Audio controls
  const bgm    = document.getElementById('bgm');
  const toggle = document.getElementById('audioToggle');
  const hint   = document.getElementById('audioHint');
  let playing  = false;

  bgm.volume = 0.52;

  function setPlaying(state) {
    playing = state;
    toggle.classList.toggle('playing', state);
    if (state && hint) hint.style.display = 'none';
  }

  toggle.addEventListener('click', async () => {
    if (playing) { bgm.pause(); setPlaying(false); }
    else {
      try { await bgm.play(); setPlaying(true); }
      catch (e) { console.warn('재생 실패:', e); }
    }
  });

  bgm.play().then(() => setPlaying(true)).catch(() => {});
</script>
</body>
</html>
